services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: arb_app
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - arb

  nginx:
    image: nginx:alpine
    container_name: arb_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - arb

  postgres:
    image: postgres:16-alpine
    container_name: arb_postgres
    environment:
      POSTGRES_DB: arbitrage
      POSTGRES_USER: arb
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - arb

  redis:
    image: redis:7-alpine
    container_name: arb_redis
    ports:
      - "6379:6379"
    networks:
      - arb

volumes:
  pgdata:

networks:
  arb:
    driver: bridge